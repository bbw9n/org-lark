name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: Emacs Lisp tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y emacs-nox pandoc

      - name: Show tool versions
        run: |
          emacs --version
          pandoc --version

      - name: Byte-compile package
        run: |
          emacs -Q --batch -L . \
            --eval '(batch-byte-compile)' org-lark.el
          rm -f org-lark.elc

      - name: Run ERT tests
        run: |
          emacs -Q --batch -L . \
            -l test/org-lark-test.el \
            -f ert-run-tests-batch-and-exit

  melpazoid:
    name: melpazoid
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install
        run: |
          sudo apt-get update
          sudo apt-get install -y emacs-nox
          emacs --version
          git clone https://github.com/riscy/melpazoid.git ~/melpazoid

      - name: Run melpazoid
        env:
          LOCAL_REPO: ${{ github.workspace }}
          RECIPE: (org-lark :fetcher github :repo "bbw9n/org-lark")
          EXIST_OK: false
        run: make -C ~/melpazoid
